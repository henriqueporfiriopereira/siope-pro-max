<!DOCTYPE html>
<html>
<head>
<title>SIOPE Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9;}
.card { background:white; padding:20px; margin:10px; border-radius:8px;}
.grid { display:grid; grid-template-columns:1fr 1fr;}
</style>
</head>

<body>

<h2>Dashboard SIOPE</h2>

<div class="grid">

<div class="card">
<h3>Correções por arquivo</h3>
<canvas id="bar"></canvas>
</div>

<div class="card">
<h3>Correções por mês</h3>
<canvas id="line"></canvas>
</div>

</div>

<div class="card">
<h3>Insights Inteligentes</h3>
<ul>
{% for i in insights %}
<li>{{i}}</li>
{% endfor %}
</ul>
</div>

<div class="card">
<h3>Upload</h3>
<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" multiple>
<button>Processar</button>
</form>
</div>

<script>
new Chart(document.getElementById('bar'), {
    type: 'bar',
    data: {
        labels: {{ nomes|tojson }},
        datasets: [{ data: {{ correcoes|tojson }} }]
    }
});

new Chart(document.getElementById('line'), {
    type: 'line',
    data: {
        labels: {{ meses|tojson }},
        datasets: [{ data: {{ valores|tojson }} }]
    }
});
</script>

</body>
</html>
