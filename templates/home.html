<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIOPE PRO MAX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f5f7fa; }
.upload-box {
    border:2px dashed #0d6efd;
    padding:40px;
    text-align:center;
    background:#fff;
    cursor:pointer;
}
</style>
</head>

<body class="container mt-4">

<h3>Bem-vindo {{ current_user.username }}</h3>

<!-- UPLOAD -->
<div class="upload-box" id="drop-area">
    Arraste arquivos aqui
    <input type="file" id="fileElem" multiple hidden>
</div>

<ul id="file-list"></ul>

<button class="btn btn-primary mt-2" onclick="uploadFiles()">Processar</button>

<a href="/relatorio_pdf" class="btn btn-danger mt-2">PDF</a>

<hr>

<canvas id="grafico"></canvas>

<script>
let filesToUpload = [];

const dropArea = document.getElementById("drop-area");
const fileElem = document.getElementById("fileElem");

dropArea.onclick = () => fileElem.click();

fileElem.onchange = (e) => handleFiles(e.target.files);

dropArea.ondrop = (e) => {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
};

dropArea.ondragover = e => e.preventDefault();

function handleFiles(files){
    for(let f of files){
        filesToUpload.push(f);
        document.getElementById("file-list").innerHTML += "<li>"+f.name+"</li>";
    }
}

function uploadFiles(){
    let formData = new FormData();
    filesToUpload.forEach(f => formData.append("file", f));

    fetch("/upload",{method:"POST",body:formData})
    .then(res=>res.blob())
    .then(blob=>{
        let a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="resultado.zip";
        a.click();
    });
}

new Chart(document.getElementById('grafico'), {
    type:'bar',
    data:{
        labels: {{ meses | tojson }},
        datasets:[{
            data: {{ valores | tojson }},
            backgroundColor:['#4e73df','#1cc88a','#36b9cc']
        }]
    }
});
</script>

</body>
</html>
