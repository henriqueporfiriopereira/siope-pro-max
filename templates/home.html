<!DOCTYPE html>
<html>
<head>
<title>SIOPE PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Dashboard</h2>

<form method="get">
<select name="municipio">
<option value="">Município</option>
{% for m in municipios %}
<option value="{{m}}">{{m}}</option>
{% endfor %}
</select>

<select name="mes">
<option value="">Mês</option>
{% for m in meses_lista %}
<option value="{{m}}">{{m}}</option>
{% endfor %}
</select>

<button>Filtrar</button>
</form>

<a href="/exportar?municipio={{request.args.get('municipio')}}&mes={{request.args.get('mes')}}">
<button>Exportar Excel</button>
</a>

<h3>Crescimento entre meses: {{crescimento}}</h3>

<canvas id="grafico"></canvas>

<script>
new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
        labels: {{ meses|tojson }},
        datasets: [{ data: {{ valores|tojson }} }]
    }
});
</script>

</body>
</html>
