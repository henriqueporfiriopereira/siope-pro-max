<!DOCTYPE html>
<html>
<head>
    <title>SIOPE Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; padding:20px; }
        .dropzone {
            border:2px dashed #007bff;
            padding:40px;
            text-align:center;
            margin-bottom:20px;
        }
        button {
            padding:10px 20px;
            margin-right:10px;
            border:none;
            cursor:pointer;
        }
        .btn-primary { background:#007bff; color:white; }
        .btn-danger { background:#dc3545; color:white; }
    </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="dropzone" id="dropzone">
    Arraste arquivos aqui
</div>

<input type="file" id="files" multiple>

<br><br>

<button class="btn-primary" onclick="enviar()">Processar</button>

<hr>

<h3>Histórico</h3>
<ul>
    {% for l in logs %}
        <li>{{ l.filename }} - {{ l.corrections }}</li>
    {% endfor %}
</ul>

<hr>

<h3>Gráfico</h3>
<canvas id="grafico"></canvas>

<script>

function enviar(){
    let input = document.getElementById("files");
    let formData = new FormData();

    for(let i=0;i<input.files.length;i++){
        formData.append("files", input.files[i]);
    }

    fetch("/upload",{
        method:"POST",
        body:formData
    })
    .then(res=>res.blob())
    .then(blob=>{
        let a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="resultado.zip";
        a.click();

        // 🔥 ATUALIZA DASHBOARD
        setTimeout(()=>{
            location.reload();
        },1000);
    });
}

// GRÁFICO
new Chart(document.getElementById('grafico'), {
    type:'bar',
    data:{
        labels: {{ meses | tojson }},
        datasets:[{
            label: 'Correções por mês',
            data: {{ valores | tojson }},
            backgroundColor:'#007bff'
        }]
    }
});

</script>

</body>
</html>
