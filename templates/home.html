<!DOCTYPE html>
<html>
<head>
<title>SIOPE PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div style="background:#003366;color:white;padding:10px;">
Bem-vindo, {{current_user.username}}
<a href="/logout" style="color:white;float:right;">Sair</a>
</div>

<h3>Upload</h3>

<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" multiple>
<button>Processar</button>
</form>

<h3>Histórico</h3>
<ul>
{% for l in logs %}
<li>{{l.filename}} - {{l.corrections}}</li>
{% endfor %}
</ul>

<h3>Correções por mês</h3>
<canvas id="grafico"></canvas>

<script>
new Chart(document.getElementById('grafico'), {
    type: 'line',
    data: {
        labels: {{ meses|tojson }},
        datasets: [{
            label: 'Correções',
            data: {{ valores|tojson }}
        }]
    }
});
</script>

</body>
</html>
