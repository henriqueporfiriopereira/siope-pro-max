<!DOCTYPE html>
<html>
<head>
<title>SIOPE PRO MAX</title>
<style>
body { font-family: Arial; background:#f4f6f9; margin:0;}
.header { background:#003366; color:white; padding:15px; font-size:20px;}
.container { padding:20px;}
.card { background:white; padding:20px; border-radius:8px; margin-bottom:20px;}
.stats { display:flex; gap:20px;}
.stat { flex:1; background:#007bff; color:white; padding:20px; border-radius:8px;}
button { background:#28a745; color:white; padding:10px; border:none;}
table { width:100%; border-collapse:collapse;}
td,th { padding:10px; border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<div class="header">SIOPE PRO MAX - Dashboard</div>

<div class="container">

<div class="stats">
<div class="stat">Arquivos: {{total_arquivos}}</div>
<div class="stat">Correções: {{total_correcoes}}</div>
</div>

<div class="card">
<h3>Enviar Arquivos</h3>
<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" multiple>
<br><br>
<button>Processar</button>
</form>
</div>

<div class="card">
<h3>Histórico</h3>
<table>
<tr><th>Arquivo</th><th>Correções</th></tr>
{% for l in logs %}
<tr>
<td>{{l.filename}}</td>
<td>{{l.corrections}}</td>
</tr>
{% endfor %}
</table>
</div>

</div>
</body>
</html>
